<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SNAIL</title>

  <style>

    body{
      background:black;
      color:#00ff88;
      font-family:monospace;
      padding:40px;
    }

    textarea{
      width:100%;
      height:120px;
      background:black;
      color:#00ff88;
      border:1px solid #00ff88;
      padding:10px;
      font-size:18px;
    }

    button{
      margin-top:20px;
      padding:10px 20px;
      background:#00ff88;
      border:none;
      font-size:18px;
    }

    #reply{
      margin-top:40px;
      white-space:pre-wrap;
      line-height:1.6;
    }

  </style>
</head>

<body>

<h1>SNAIL</h1>

<p>
touch me and speak to me
</p >

<textarea id="input"></textarea>

<br>

<button onclick="talk()">
SEND
</button>

<div id="reply"></div>

<script>

async function talk(){

  const text =
    document.getElementById("input").value;

  document.getElementById("reply").innerHTML =
    "thinking...";

  const response = await fetch(
    "https://api.openai.com/v1/chat/completions",
    {
      method:"POST",

      headers:{
        "Content-Type":"application/json",

        "Authorization":
        "Bearer 你的APIKEY"
      },

      body:JSON.stringify({

        model:"gpt-4o-mini",

        messages:[
          {
            role:"system",
            content:
            "You are a poetic snail creature speaking softly to humans."
          },

          {
            role:"user",
            content:text
          }
        ]
      })
    }
  );

  const data = await response.json();

  document.getElementById("reply").innerHTML =
    data.choices[0].message.content;
}

</script>

</body>
</html>
