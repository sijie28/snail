<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Snail</title>
  <style>
    body {
      background: #07110d;
      color: #39ff6a;
      font-family: monospace;
      padding: 40px;
    }
    input {
      width: 420px;
      padding: 10px;
    }
    button {
      padding: 10px;
    }
    #reply {
      margin-top: 30px;
      color: #39ff6a;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <h1>蜗牛</h1>

  <input id="message" placeholder="talk to the snail">
  <button onclick="sendMessage()">发送</button>

  <div id="reply"></div>

  <script>
    async function sendMessage() {
      const text = document.getElementById("message").value;
      const replyBox = document.getElementById("reply");

      replyBox.innerText = "……";

      const response = await fetch("/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          message: text
        })
      });

      const data = await response.json();

      replyBox.innerText = data.reply || "没有收到回复";
    }
  </script>
</body>
</html>
