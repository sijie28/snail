
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>talk to me</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:white;
  color:black;
  font-family:Helvetica, Arial, sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  width:100%;
  max-width:420px;
  padding:28px;
}

h1{
  font-size:24px;
  font-weight:400;
  margin-bottom:28px;
  text-align:left;
}

input{
  width:100%;
  padding:16px;
  border:1px solid black;
  font-size:18px;
  outline:none;
  border-radius:0;
  background:white;
}

button{
  width:100%;
  margin-top:14px;
  padding:16px;
  border:1px solid black;
  background:white;
  color:black;
  cursor:pointer;
  font-size:18px;
  border-radius:0;
}

#reply{
  margin-top:32px;
  font-size:20px;
  line-height:1.5;
  white-space:pre-wrap;
  min-height:80px;
}
</style>
</head>

<body>

<div class="container">

  <h1>talk to me</h1>

  <input id="message" placeholder="input">
  <button onclick="sendMessage()">send</button>

  <div id="reply"></div>

</div>

<script>
async function sendMessage() {
  const text = document.getElementById("message").value;
  const replyBox = document.getElementById("reply");

  replyBox.innerText = "processing...";

  const response = await fetch("/api/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: text
    })
  });

  const data = await response.json();

  replyBox.innerText = data.reply || "no output";
}
</script>

</body>
</html>
