<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Snail AI</title>

  <style>

    body{
      background:black;
      color:#00ff88;
      font-family:monospace;
      padding:40px;
    }

    h1{
      font-size:48px;
    }

    textarea{
      width:100%;
      height:120px;
      background:#111;
      color:white;
      border:1px solid #00ff88;
      padding:20px;
      font-size:20px;
    }

    button{
      margin-top:20px;
      padding:15px 30px;
      font-size:20px;
      background:#00ff88;
      border:none;
      cursor:pointer;
    }

    #reply{
      margin-top:40px;
      font-size:24px;
      white-space:pre-wrap;
    }

  </style>
</head>

<body>

<h1>SNAIL</h1>

<p>Talk to the snail.</p >

<textarea id="input"></textarea>

<br>

<button onclick="sendMessage()">SEND</button>

<div id="reply"></div>

<script>

async function sendMessage(){

  const text = document.getElementById("input").value;

  document.getElementById("reply").innerText = "thinking...";

  const response = await fetch("/api/chat",{

    method:"POST",

    headers:{
      "Content-Type":"application/json"
    },

    body:JSON.stringify({
      message:text
    })

  });

  const data = await response.json();

  document.getElementById("reply").innerText = data.reply;
}

</script>

</body>
</html>
