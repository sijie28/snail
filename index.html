<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>interface</title>

<style>
body{
  margin:0;
  background:white;
  color:black;
  font-family:Helvetica, Arial, sans-serif;
  padding:60px;
}

h1{
  font-size:18px;
  font-weight:400;
  margin-bottom:40px;
}

input{
  width:360px;
  padding:12px;
  border:1px solid black;
  font-size:16px;
  outline:none;
}

button{
  padding:12px 18px;
  border:1px solid black;
  background:white;
  cursor:pointer;
  font-size:16px;
}

#reply{
  margin-top:40px;
  font-size:18px;
  line-height:1.6;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<h1>talk to me</h1>

<input id="message" placeholder="input">
<button onclick="sendMessage()">send</button>

<div id="reply"></div>

<script>
async function sendMessage() {
  const text = document.getElementById("message").value;
  const replyBox = document.getElementById("reply");

  replyBox.innerText = "processing...";

  const response = await fetch("/api/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: text
    })
  });

  const data = await response.json();

  replyBox.innerText = data.reply || "no output";
}
</script>

</body>
</html>
